<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 620" role="img" aria-label="Android Settings — Install Unknown Apps screen. Tap the toggle next to Allow from this source to enable APK installation.">
  <defs>
    <marker id="tip" markerWidth="12" markerHeight="8" refX="10" refY="4" orient="auto">
      <polygon points="0,0 12,4 0,8" fill="#D97706"/>
    </marker>
    <filter id="sh" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="10" flood-color="#000" flood-opacity="0.4"/>
    </filter>
    <filter id="cs" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- Phone shell -->
  <rect x="6" y="6" width="348" height="608" rx="40" fill="#0F172A" filter="url(#sh)"/>
  <!-- Side buttons -->
  <rect x="2" y="168" width="4" height="36" rx="2" fill="#1E293B"/>
  <rect x="2" y="218" width="4" height="58" rx="2" fill="#1E293B"/>
  <rect x="354" y="198" width="4" height="48" rx="2" fill="#1E293B"/>
  <!-- Notch pill -->
  <rect x="138" y="14" width="84" height="24" rx="12" fill="#0F172A"/>

  <!-- Screen background -->
  <rect x="16" y="52" width="328" height="508" rx="5" fill="#F4F4F5"/>

  <!-- STATUS BAR -->
  <rect x="16" y="52" width="328" height="30" fill="#1565C0"/>
  <text x="32" y="72" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="700" fill="white">9:41</text>
  <!-- Signal bars -->
  <rect x="262" y="67" width="3" height="10" rx="1" fill="white" opacity="0.5"/>
  <rect x="267" y="64" width="3" height="13" rx="1" fill="white" opacity="0.7"/>
  <rect x="272" y="61" width="3" height="16" rx="1" fill="white"/>
  <rect x="277" y="58" width="3" height="19" rx="1" fill="white"/>
  <!-- Battery -->
  <rect x="290" y="62" width="18" height="9" rx="2" fill="none" stroke="white" stroke-width="1.5"/>
  <rect x="308" y="65" width="2.5" height="3" rx="1" fill="white"/>
  <rect x="291.5" y="63.5" width="12" height="6" rx="1.5" fill="#4ADE80"/>

  <!-- TOOLBAR -->
  <rect x="16" y="82" width="328" height="52" fill="#1565C0"/>
  <polyline points="44,101 35,108 44,115" stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="57" y="113" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="500" fill="white">Install Unknown Apps</text>

  <!-- White description card -->
  <rect x="16" y="134" width="328" height="56" fill="white"/>
  <text x="32" y="156" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6B7280">Allow this app to install other APKs</text>
  <text x="32" y="174" font-family="Arial, Helvetica, sans-serif" font-size="13" fill="#6B7280">downloaded from outside the Play Store.</text>

  <!-- Gray separator -->
  <rect x="16" y="190" width="328" height="8" fill="#E4E4E7"/>

  <!-- MAIN SETTING ROW: Allow from this source -->
  <rect x="16" y="198" width="328" height="76" fill="white"/>
  <text x="32" y="222" font-family="Arial, Helvetica, sans-serif" font-size="15" font-weight="600" fill="#18181B">Allow from this source</text>
  <text x="32" y="241" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#A1A1AA">Your phone and data are more</text>
  <text x="32" y="258" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#A1A1AA">vulnerable when this is on.</text>

  <!-- Toggle OFF -->
  <rect x="282" y="220" width="46" height="26" rx="13" fill="#D4D4D8"/>
  <circle cx="295" cy="233" r="11" fill="white" filter="url(#cs)"/>

  <!-- Gray separator -->
  <rect x="16" y="274" width="328" height="8" fill="#E4E4E7"/>

  <!-- Blurred placeholder rows to imply more settings below -->
  <rect x="16" y="282" width="328" height="54" fill="white"/>
  <rect x="32" y="298" width="160" height="11" rx="3" fill="#F4F4F5"/>
  <rect x="32" y="315" width="110" height="9" rx="3" fill="#F4F4F5"/>
  <line x1="16" y1="336" x2="344" y2="336" stroke="#F4F4F5" stroke-width="1"/>

  <rect x="16" y="336" width="328" height="54" fill="white"/>
  <rect x="32" y="352" width="140" height="11" rx="3" fill="#F4F4F5"/>
  <rect x="32" y="369" width="90" height="9" rx="3" fill="#F4F4F5"/>
  <line x1="16" y1="390" x2="344" y2="390" stroke="#F4F4F5" stroke-width="1"/>

  <!-- Fade overlay for rows below to draw focus up -->
  <rect x="16" y="336" width="328" height="110" fill="white" opacity="0.6"/>

  <!-- Home indicator -->
  <rect x="141" y="548" width="78" height="4" rx="2" fill="#D4D4D8"/>

  <!-- ===== CURVED ARROW ===== -->
  <!-- Toggle center ≈ (305, 233). Arrow starts at top of label box ≈ (182, 460) -->
  <path d="M 182 460 Q 265 372 299 248"
        stroke="#D97706" stroke-width="3.5" fill="none"
        stroke-linecap="round"
        marker-end="url(#tip)"/>

  <!-- Arrow label box -->
  <rect x="58" y="458" width="244" height="58" rx="13" fill="#D97706"/>
  <!-- Subtle inner highlight strip -->
  <rect x="60" y="460" width="240" height="26" rx="11" fill="rgba(255,255,255,0.12)"/>
  <text x="180" y="483" font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="700" fill="white" text-anchor="middle">Tap the toggle to enable</text>
  <text x="180" y="502" font-family="Arial, Helvetica, sans-serif" font-size="12" fill="rgba(255,255,255,0.88)" text-anchor="middle">Do this for your browser or file manager</text>
</svg>
